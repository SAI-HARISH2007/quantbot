# quantbot default configuration.
# Every value can be overridden by env vars: QUANTBOT_RISK__KELLY_FRACTION=0.1
polymarket:
  gamma_url: https://gamma-api.polymarket.com
  clob_url: https://clob.polymarket.com
  ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  rate_limit_rps: 5.0

crypto:
  symbols: [BTCUSDT, ETHUSDT]

storage:
  root: data

costs:
  # Polymarket currently charges 0 maker/taker on most markets — re-verify per market.
  taker_fee_bps: 0.0
  maker_fee_bps: 0.0
  extra_slippage: 0.001

risk:
  initial_capital: 10000.0
  max_position_per_market: 500.0
  max_total_exposure: 5000.0
  max_drawdown_pct: 0.15
  kelly_fraction: 0.25
  max_kelly_stake_pct: 0.05
  min_edge: 0.02
  min_order_notional: 5.0

backtest:
  fill_at: cross
  latency_ms: 500.0

strategies:
  - name: fair_value_deviation
    enabled: true
    params:
      entry_threshold: 0.05
      uncertainty_mult: 1.0
  - name: mean_reversion
    enabled: true
    params:
      lookback: 20
      entry_z: 2.0
  - name: momentum
    enabled: false          # enable only if walk-forward beats mean_reversion
    params:
      lookback: 30
      entry_move: 0.04
  - name: obi
    enabled: true
    params:
      depth: 5
      entry_imbalance: 0.6
  - name: complement_arb
    enabled: true
    params:
      min_edge: 0.01

log_level: INFO
